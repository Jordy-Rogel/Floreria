<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Petalo De Seda</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
 
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css" rel="stylesheet"/>
  <script src="https://kit.fontawesome.com/6cfc57a943.js" crossorigin="anonymous"></script>
    
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav class="navbar navbar-expand-lg px-4 shadow-sm">
    
      <i class="ri-flower-fill fs-4 text-danger me-2"></i> <span class="brand-name">Petalo De Seda</span>
  
    <button class="navbar-toggler bg-white" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto me-2">
        <li class="nav-item"><a class="nav-link" href="index.html">Volver</a></li>
    

      </ul>
      <div class="d-flex align-items-center gap-2">
        
        <a href="carrito.html" class="carro" class="text-white fs-4"><i class="fa-solid fa-cart-shopping"></i></a>
      </div>
    </div>
    
  </nav>
 

  <div class="container mt-5 mb-5">
    <h3 class="mb-4">Carrito de compras</h3>
    <div class="table-responsive bg-dark p-4 rounded">
      <table class="table table-dark table-borderless align-middle" id="tablaCarrito">
        <thead>
          <tr>
            <th>Producto</th>
            <th>Precio</th>
            <th>Cantidad</th>
            <th>Total</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody>
          
        </tbody>
      </table>
      <div class="d-flex justify-content-between align-items-center mt-3">
        <h5>Total general: <span id="totalGeneral">$0</span></h5>
        <div class="d-flex gap-2">
          <button class="btn btn-danger btn-sm" onclick="vaciarCarrito()">Vaciar carrito</button>
          <button class="btn btn-success btn-sm">Finalizar compra</button>
        </div>
      </div>
    </div>
  </div>
   <div class="text-center mt-4">
    <button class="btn btn-primary" onclick="agregarArreglo()">
      ➕ Añadir arreglo floral especial
    </button>
  </div>

</body>
</html>
