<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Florería | Iniciar sesión / Registro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background-color: #1e1e24;
      background-repeat: no-repeat;
      background-size: cover;
    }

    .form-container {
      background-color: #2a2a35;
      border-radius: 15px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
    }

    .btn-outline-primary.active {
      background-color: #e91e63;
      color: white;
      border-color: #e91e63;
    }

    .btn-outline-primary {
      border-color: #e91e63;
      color: #e91e63;
    }

    .btn-outline-primary:hover {
      background-color: #e91e63;
      color: white;
    }

    .btn-primary {
      background-color: #e91e63;
      border-color: #e91e63;
    }

    .btn-primary:hover {
      background-color: #d81b60;
      border-color: #d81b60;
    }
  </style>
</head>
<body >
  
<nav class="navbar navbar-expand-lg px-4 shadow-sm">
    
      <i class="ri-flower-fill fs-4 text-danger me-2"></i> <span class="brand-name">Petalo De Seda</span>
  
    <button class="navbar-toggler bg-white" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto me-2">
        <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
        <li class="nav-item"><a class="nav-link" href="ecosistema.html">Ecosistema</a></li>
        <li class="nav-item"><a class="nav-link" href="#contacto">Contacto</a></li>
        <li class="nav-item"><a class="nav-link active" href="login.html">Iniciar sesión</a></li>
        <li class="nav-item"><a class="nav-link" href="actualizar.html">Actualizar datos</a></li>
        <li class="nav-item"><a class="nav-link" href="loginadmin.html">Administrador</a></li>

      </ul>
      <div class="d-flex align-items-center gap-2">
        
        <a href="carrito.html" class="carro" class="text-white fs-4"><i class="fa-solid fa-cart-shopping"></i></a>
      </div>
    </div>
    
  </nav>

<div class="d-flex justify-content-center align-items-center vh-100">
  <div class="form-container p-4" style="width: 350px;">
    
    <h4 class="text-center mb-4 text-success">🌸 Bienvenidos 🌷</h4>
    <div class="d-flex justify-content-center mb-3">
      <button id="loginToggle" class="btn btn-outline-primary me-2 active">Iniciar sesión</button>
      <button id="registerToggle" class="btn btn-outline-primary">Registrarse</button>
    </div>

    
    <form id="loginForm">
      <div class="mb-3">
        <input id="loginEmail" type="email" class="form-control" placeholder="you@example.com" required />
      </div>
      <div class="mb-3">
        <input id="loginPassword" type="password" class="form-control" placeholder="Contraseña" required />
      </div>
      <button type="submit" class="btn btn-primary w-100 mb-2">Iniciar sesión</button>
    </form>

   
    <form id="registerForm" class="d-none">
      <div class="mb-3">
        <input id="registerName" type="text" class="form-control" placeholder="Nombre completo" required />
      </div>
      <div class="mb-3">
        <input id="registerEmail" type="email" class="form-control" placeholder="you@example.com" required />
      </div>
      <div class="mb-3">
        <input id="registerPassword" type="password" class="form-control" placeholder="Crear una contraseña" required />
      </div>
      <div class="mb-3">
        <input id="registerRepeatPassword" type="password" class="form-control" placeholder="Repetir contraseña" required />
      </div>
      <button type="submit" class="btn btn-primary w-100 mb-2">Registrarse</button>
    </form>
  </div>
</div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const loginBtn = document.getElementById('loginToggle');
    const registerBtn = document.getElementById('registerToggle');
    const loginForm = document.getElementById('loginForm');
    const registerForm = document.getElementById('registerForm');
    const loginEmail = document.getElementById('loginEmail');
    const loginPassword = document.getElementById('loginPassword');
    const registerName = document.getElementById('registerName');
    const registerEmail = document.getElementById('registerEmail');
    const registerPassword = document.getElementById('registerPassword');
    const registerRepeatPassword = document.getElementById('registerRepeatPassword');

    loginBtn.addEventListener('click', () => {
      loginForm.classList.remove('d-none');
      registerForm.classList.add('d-none');
      loginBtn.classList.add('active');
      registerBtn.classList.remove('active');
    });

    registerBtn.addEventListener('click', () => {
      registerForm.classList.remove('d-none');
      loginForm.classList.add('d-none');
      registerBtn.classList.add('active');
      loginBtn.classList.remove('active');
    });

    
    loginForm.addEventListener('submit', function(event) {
      event.preventDefault();
      const email = loginEmail.value;
      const password = loginPassword.value;

      if (
        (email === "petalo@demo.com" && password === "flor123") ||
        (email === registerEmail.value && password === registerPassword.value)
      ) {
        window.location.href = "index.html";
      } else {
        alert("Credenciales incorrectas, intenta de nuevo 💐");
      }
    });

    
    registerForm.addEventListener('submit', function(event) {
      event.preventDefault();

      const fullName = registerName.value;
      const email = registerEmail.value;
      const password = registerPassword.value;
      const repeatPassword = registerRepeatPassword.value;

      if (password !== repeatPassword) {
        alert("Las contraseñas no coinciden 💔");
        return;
      }

      alert(`¡Registro exitoso, ${fullName}! Ahora inicia sesión 🌸`);

     
      loginEmail.value = email;
      loginPassword.value = password;

      
      loginForm.classList.remove('d-none');
      registerForm.classList.add('d-none');
      loginBtn.classList.add('active');
      registerBtn.classList.remove('active');
    });
  </script>
</body>
</html>
