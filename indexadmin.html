<div id="form-container" class="mt-4"></div>

<script>
  const arreglosMock = [
    { nombre: 'Romántico Rojo', descripcion: 'Arreglo con rosas rojas y follaje elegante.', precio: 450 },
    { nombre: 'Sol de Verano', descripcion: 'Girasoles vibrantes con acentos amarillos.', precio: 380 },
    { nombre: 'Primavera Pastel', descripcion: 'Tulipanes y lirios en tonos suaves.', precio: 520 },
    { nombre: 'Orquídea Imperial', descripcion: 'Arreglo exótico con orquídeas blancas.', precio: 600 }
  ];

  function createArregloForm(action) {
    const includeSearch = ['Editar', 'Eliminar'].includes(action);
    const isReadOnly = action === 'Eliminar';

    const searchSection = includeSearch ? `
      <div class="mb-3">
        <label class="form-label">Buscar Arreglo</label>
        <div class="input-group">
          <input type="text" class="form-control" id="search-arreglo" placeholder="Nombre del arreglo">
          <button class="btn btn-outline-secondary" onclick="searchArreglo('${action}')">Buscar</button>
        </div>
      </div>
    ` : '';

    const formHTML = `
      <div class="card mt-3">
        <div class="card-header ${action === 'Eliminar' ? 'bg-danger' : 'bg-info'} text-white">
          ${action} Arreglo
        </div>
        <div class="card-body">
          ${searchSection}
          <form onsubmit="handleArregloSubmit(event, '${action}')">
            <div class="mb-3">
              <label class="form-label">Nombre</label>
              <input type="text" class="form-control" id="input-nombre-arreglo" ${isReadOnly ? 'readonly' : ''}>
            </div>
            <div class="mb-3">
              <label class="form-label">Descripción</label>
              <textarea class="form-control" rows="3" id="input-descripcion-arreglo" ${isReadOnly ? 'readonly' : ''}></textarea>
            </div>
            <div class="mb-3">
              <label class="form-label">Precio</label>
              <input type="number" class="form-control" id="input-precio-arreglo" ${isReadOnly ? 'readonly' : ''}>
            </div>
            <div class="mb-3">
              <label class="form-label">Imagen</label>
              <input type="file" class="form-control" id="input-imagen-arreglo" ${isReadOnly ? 'disabled' : ''}>
            </div>
            <button type="submit" class="btn ${action === 'Eliminar' ? 'btn-danger' : 'btn-success'}">${action}</button>
          </form>
        </div>
      </div>
    `;
    document.getElementById('form-container').innerHTML = formHTML;
  }

  function searchArreglo(action) {
    const searchValue = document.getElementById('search-arreglo').value.trim().toLowerCase();
    const found = arreglosMock.find(arr => arr.nombre.toLowerCase().includes(searchValue));

    document.getElementById('input-nombre-arreglo').value = found ? found.nombre : '';
    document.getElementById('input-descripcion-arreglo').value = found ? found.descripcion : '';
    document.getElementById('input-precio-arreglo').value = found ? found.precio : '';
  }

  function handleArregloSubmit(event, action) {
    event.preventDefault();

    const nombre = document.getElementById('input-nombre-arreglo').value.trim();
    const descripcion = document.getElementById('input-descripcion-arreglo').value.trim();
    const precio = parseFloat(document.getElementById('input-precio-arreglo').value);

    if (!nombre || !descripcion || isNaN(precio)) return;

    const index = arreglosMock.findIndex(arr => arr.nombre === nombre);

    if (action === 'Editar' && index !== -1) {
      arreglosMock[index].descripcion = descripcion;
      arreglosMock[index].precio = precio;
      document.getElementById('form-container').innerHTML = ''; 
    }

    if (action === 'Eliminar' && index !== -1) {
      arreglosMock.splice(index, 1);
      document.getElementById('form-container').innerHTML = ''; 
    }
  }

  document.addEventListener('DOMContentLoaded', () => {
    document.querySelector('.btn-agregar-arreglo')?.addEventListener('click', () => createArregloForm('Agregar'));
    document.querySelector('.btn-editar-arreglo')?.addEventListener('click', () => createArregloForm('Editar'));
    document.querySelector('.btn-eliminar-arreglo')?.addEventListener('click', () => createArregloForm('Eliminar'));
  });
</script>

<div id="ventas-visual" class="mt-4"></div>


<script>
  const ventas = [
    { producto: 'Romántico Rojo', precio: 450, cantidad: 1 },
    { producto: 'Sol de Verano', precio: 380, cantidad: 2 }
  ];

  let historialVisible = false;

  function createVentaForm(action) {
    const includeSearch = action === 'Eliminar';
    const isReadOnly = action === 'Eliminar';

    const searchSection = includeSearch ? `
      <div class="mb-3">
        <label class="form-label">Buscar Venta</label>
        <div class="input-group">
          <input type="text" class="form-control" id="search-venta" placeholder="Nombre del producto vendido">
          <button class="btn btn-outline-secondary" onclick="searchVenta()">Buscar</button>
        </div>
      </div>
    ` : '';

    const formHTML = `
      <div class="card mt-3">
        <div class="card-header ${action === 'Eliminar' ? 'bg-danger' : 'bg-success'} text-white">
          ${action} Venta
        </div>
        <div class="card-body">
          ${searchSection}
          <form onsubmit="handleVentaSubmit(event, '${action}')">
            <div class="mb-3">
              <label class="form-label">Producto</label>
              <input type="text" class="form-control" id="input-producto-venta" ${isReadOnly ? 'readonly' : ''}>
            </div>
            <div class="mb-3">
              <label class="form-label">Precio</label>
              <input type="number" class="form-control" id="input-precio-venta" min="0" step="0.01" ${isReadOnly ? 'readonly' : ''}>
            </div>
            <div class="mb-3">
              <label class="form-label">Cantidad</label>
              <input type="number" class="form-control" id="input-cantidad-venta" min="1" ${isReadOnly ? 'readonly' : ''}>
            </div>
            <button type="submit" class="btn ${action === 'Eliminar' ? 'btn-danger' : 'btn-success'}">${action}</button>
          </form>
        </div>
      </div>
    `;
    document.getElementById('form-container').innerHTML = formHTML;
  }

  function searchVenta() {
    const searchValue = document.getElementById('search-venta').value.trim().toLowerCase();
    const found = ventas.find(v => v.producto.toLowerCase().includes(searchValue));

    document.getElementById('input-producto-venta').value = found ? found.producto : '';
    document.getElementById('input-precio-venta').value = found ? found.precio : '';
    document.getElementById('input-cantidad-venta').value = found ? found.cantidad : '';
  }

  function handleVentaSubmit(event, action) {
    event.preventDefault();

    const producto = document.getElementById('input-producto-venta').value.trim();
    const precio = parseFloat(document.getElementById('input-precio-venta').value);
    const cantidad = parseInt(document.getElementById('input-cantidad-venta').value);

    if (!producto || isNaN(precio) || isNaN(cantidad)) return;

    const index = ventas.findIndex(v => v.producto === producto);

    if (action === 'Registrar') {
      ventas.push({ producto, precio, cantidad });
      document.getElementById('form-container').innerHTML = '';
      if (historialVisible) renderVentasVisual();
    }

    if (action === 'Eliminar' && index !== -1) {
      ventas.splice(index, 1);
      document.getElementById('form-container').innerHTML = '';
      if (historialVisible) renderVentasVisual();
    }
  }

  function renderVentasVisual() {
    const visualContainer = document.getElementById('ventas-visual');

    if (ventas.length === 0) {
      visualContainer.innerHTML = '<p class="text-muted">No hay ventas registradas.</p>';
      return;
    }

    let total = 0;
    let rows = ventas.map(v => {
      const subtotal = v.precio * v.cantidad;
      total += subtotal;
      return `
        <tr>
          <td>${v.producto}</td>
          <td>$${v.precio.toFixed(2)}</td>
          <td>${v.cantidad}</td>
          <td>$${subtotal.toFixed(2)}</td>
        </tr>
      `;
    }).join('');

    const tableHTML = `
      <div class="card">
        <div class="card-header bg-secondary text-white">Historial de Ventas</div>
        <div class="card-body p-0">
          <table class="table table-striped mb-0">
            <thead>
              <tr>
                <th>Producto</th>
                <th>Precio</th>
                <th>Cantidad</th>
                <th>Total</th>
              </tr>
            </thead>
            <tbody>
              ${rows}
            </tbody>
            <tfoot>
              <tr>
                <td colspan="3" class="text-end fw-bold">Total Acumulado</td>
                <td class="fw-bold">$${total.toFixed(2)}</td>
              </tr>
            </tfoot>
          </table>
        </div>
      </div>
    `;

    visualContainer.innerHTML = tableHTML;
  }

  function toggleHistorialVentas() {
    historialVisible = !historialVisible;
    const visualContainer = document.getElementById('ventas-visual');
    const btn = document.querySelector('.btn-historial-ventas');

    if (historialVisible) {
      renderVentasVisual();
      btn.textContent = 'Ocultar Historial';
    } else {
      visualContainer.innerHTML = '';
      btn.textContent = 'Historial de Ventas';
    }
  }

  document.addEventListener('DOMContentLoaded', () => {
    document.querySelector('.btn-agregar-venta')?.addEventListener('click', () => createVentaForm('Registrar'));
    document.querySelector('.btn-eliminar-venta')?.addEventListener('click', () => createVentaForm('Eliminar'));
    document.querySelector('.btn-historial-ventas')?.addEventListener('click', toggleHistorialVentas);
  });
</script>
