  <div class="container py-5">

    

    <div class="card shadow-sm" style="background-color: darkslategrey; color: antiquewhite;">
      <div class="card-header bg-info text-white color">
        <h5 class="mb-0">Actualizar Datos Personales</h5>
      </div>
      <div class="card-body">
        <form>
          <div class="mb-3">
            <label for="nombre" class="form-label">Nombre completo</label>
            <input type="text" class="form-control" id="nombre" placeholder="Ej. Selene Garcia">
          </div>
          <div class="mb-3">
            <label for="correo" class="form-label">Correo electrónico</label>
            <input type="email" class="form-control" id="correo" placeholder="Ej. selene@email.com">
          </div>
          <div class="mb-3">
            <label for="contrasena" class="form-label">Contraseña</label>
            <input type="password" class="form-control" id="contrasena" placeholder="********">
          </div>
          <div class="mb-3">
            <label for="direccion" class="form-label">Dirección</label>
            <input type="text" class="form-control" id="direccion" placeholder="Ej. Calle 123, Tejupilco">
          </div>
          <div class="mb-3">
            <label for="telefono" class="form-label">Teléfono</label>
            <input type="tel" class="form-control" id="telefono" placeholder="Ej. 722-123-4567">
          </div>
         <a href="index.html" class="btn btn-primary w-100" style="background-color: rgb(16, 12, 42);">Guardar Cambios</a>
        </form>
      </div>
    </div>
